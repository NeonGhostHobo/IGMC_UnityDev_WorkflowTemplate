name: IGMC Intake (What I want tomorrow)
description: Free-form request that triggers the IGMC Copilot process.
labels: ["igmc"]
body:
  - type: markdown
    attributes:
      value: |
        Submit a free-form request.

        Intended flow for this repo:
        - Create this Issue
        - Assign it to Copilot coding agent
        - Copilot opens a PR and iterates until CI passes

        Alternate input (design docs):
        - You can also submit a free-form design document via the "IGMC Design Doc Intake" issue template,
          or by pushing a file into `design_docs/` (if this repo includes that folder/workflow).
        - The intended outcome is a PR that generates a dependency-ordered set of `tickets/*.md`.

        If you are assigning this Issue to Copilot coding agent:
        - The PR must update the required `/docs/*` artifacts first
        - The PR must include at least one `tickets/*.md`
        - If code changes occur, the PR must add/update `review.md`

  - type: textarea
    id: request
    attributes:
      label: Request
      description: Describe what you want in as much or as little detail as you like.
      placeholder: |
        Example:
        - Add a simple in-game FPS counter
        - Keep changes minimal
        - Include updated docs/tickets and a review.md pass
    validations:
      required: true
