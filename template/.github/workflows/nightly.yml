name: Nightly (IGMC Integrity Gate)

on:
  schedule:
    - cron: "10 1 * * *"  # 01:10 UTC nightly
  workflow_dispatch:

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  integrity:
    name: Nightly IGMC integrity checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Validate Orchestrator Artifacts
        run: python3 scripts/validate_artifacts.py
